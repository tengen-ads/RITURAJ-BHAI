<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rituraj Portfolio</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
}
.card {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
}
</style>

</head>
<body class="text-white">

<div class="max-w-4xl mx-auto p-5 text-center">

  <!-- HERO -->
  <section class="mt-10">
    <h1 class="text-4xl font-bold">Rituraj</h1>
    <p class="text-gray-300 mt-2">Fullstack Developer 🚀</p>
    <button class="mt-4 px-6 py-2 bg-blue-400 text-black rounded-lg">Resume</button>
  </section>

  <!-- SKILLS -->
  <section class="mt-16">
    <h2 class="text-2xl font-semibold mb-5">Skills</h2>
    <div class="flex flex-wrap justify-center gap-3">
      <span class="card px-4 py-2">HTML</span>
      <span class="card px-4 py-2">CSS</span>
      <span class="card px-4 py-2">JavaScript</span>
      <span class="card px-4 py-2">React</span>
      <span class="card px-4 py-2">Python</span>
    </div>
  </section>

  <!-- PROJECTS -->
  <section class="mt-16">
    <h2 class="text-2xl font-semibold mb-5">Projects</h2>

    <div class="grid md:grid-cols-2 gap-4">

      <div class="card p-4">
        <h3 class="text-lg font-semibold">E-commerce</h3>
        <p class="text-gray-300">Shopping website with payment</p>
      </div>

      <div class="card p-4">
        <h3 class="text-lg font-semibold">Blog Website</h3>
        <p class="text-gray-300">News blogging platform</p>
      </div>

      <div class="card p-4">
        <h3 class="text-lg font-semibold">AI Chatbot</h3>
        <p class="text-gray-300">Support chatbot</p>
      </div>

    </div>
  </section>

  <!-- ABOUT -->
  <section class="mt-16 mb-10">
    <h2 class="text-2xl font-semibold mb-3">About</h2>
    <p class="text-gray-300">I build modern and responsive websites.</p>
  </section>

</div>

</body>
</html>
